  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #fff;
      --black: #111;
      --text: #333;
      --muted: #888;
      --border: #e8e8e8;
      --accent: #22c55e;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::selection { background: var(--black); color: var(--white); }

    nav {
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--serif);
      font-weight: 900;
      font-style: italic;
      font-size: 24px;
      letter-spacing: -1px;
      color: var(--black);
      cursor: default;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 32px 40px;
    }
    .confirm {
      max-width: 560px;
      text-align: center;
    }

    .check-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      margin-bottom: 32px;
      box-shadow: 0 16px 40px rgba(34,197,94,0.35);
      animation: pop 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .check-badge svg { width: 38px; height: 38px; }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(44px, 7vw, 80px);
      font-weight: 400;
      line-height: 0.98;
      letter-spacing: -2px;
      color: var(--black);
      margin-bottom: 20px;
    }
    h1 em { font-style: italic; }

    .lede {
      font-size: clamp(16px, 1.8vw, 18px);
      line-height: 1.65;
      color: var(--text);
      font-weight: 400;
      max-width: 460px;
      margin: 0 auto 28px;
    }

    .spam-note {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 400;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    footer {
      padding: 28px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      main { padding: 56px 20px 32px; }
      .check-badge { width: 68px; height: 68px; margin-bottom: 24px; }
      .check-badge svg { width: 30px; height: 30px; }
      footer { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="logo">100</span>
  </nav>

  <main>
    <div class="confirm">
      <div class="check-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12.5l5 5 11-11"/>
        </svg>
      </div>

      <h1>Spot <em>held.</em></h1>
      <p class="lede">
        Check your email for the calendar invite.
      </p>
      <p class="spam-note">
        If you don't see it within 5 minutes, check spam.
      </p>
    </div>
  </main>

  <footer>
    &copy; 100 Creatives &middot; 2587689 Alberta LTD.
  </footer>

  <!-- Vercel Web Analytics -->
  <script src="/_vercel/insights/script.js" defer></script>

</body>
</html>
